site_name: MaestroNvim
site_url: https://rmkohlman.github.io/MaestroNvim/
site_description: Neovim configuration management for the DevOpsMaestro ecosystem
site_author: Robert Kohlman
repo_name: rmkohlman/MaestroNvim
repo_url: https://github.com/rmkohlman/MaestroNvim
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
plugins:
  - search
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/MaestroNvim
nav:
  - Home: index.md
  - Nvim Manager: nvim-manager.md
  - Plugins: plugins.md
  - Plugin Store: store.md
  - Core Config: config.md
  - Plugin Library: library.md
  - Packages: packages.md
  - Sync Framework: sync.md
  - API Reference: api-reference.md
