site_name: nvp (NvimOps)
site_url: https://rmkohlman.github.io/MaestroNvim/
site_description: kubectl-style Neovim plugin and theme manager
site_author: Robert Kohlman
repo_name: rmkohlman/MaestroNvim
repo_url: https://github.com/rmkohlman/MaestroNvim

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/MaestroNvim

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Plugins:
    - Overview: plugins/overview.md
    - Plugin Library: plugins/library.md
    - Plugin Packages: plugins/packages.md
    - Plugin Sources: plugins/sources.md
  - Themes:
    - Overview: themes/overview.md
    - Theme Library: themes/library.md
    - CoolNight Collection: themes/coolnight.md
    - Parametric Generator: themes/parametric.md
  - Configuration:
    - Neovim Core Config: configuration/core-config.md
    - YAML Schema: configuration/yaml-schema.md
  - Commands Reference: commands.md
  - YAML Reference:
    - NvimPlugin: reference/nvim-plugin.md
    - NvimTheme: reference/nvim-theme.md
    - NvimPackage: reference/nvim-package.md
